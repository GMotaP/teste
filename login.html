<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a1a11">
<title>PAY4CHARGE · Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=4">
</head>
<body class="login-body">
  <div class="login-card">
    <img class="login-logo" src="logo.png" alt="PAY4CHARGE">
    <p class="login-sub">Entre para acessar seu painel</p>

    <form id="login-form" autocomplete="on">
      <label class="login-label" for="email">E-mail</label>
      <input class="login-input" type="email" id="email" placeholder="voce@email.com" required>

      <label class="login-label" for="senha">Senha</label>
      <input class="login-input" type="password" id="senha" placeholder="••••••••" required>

      <div id="login-err" class="login-err" style="display:none"></div>

      <button class="login-btn" id="btn" type="submit">Entrar</button>
    </form>

    <p class="login-foot">PAY4CHARGE · ACESSO RESTRITO</p>
  </div>

<script src="auth.js?v=3"></script>
<script src="login.js?v=2"></script>
</body>
</html>
